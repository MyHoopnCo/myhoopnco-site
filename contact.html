<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <title>MyHoop&Co</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/Logo_NoWords.png">
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <img src="images/Logo_NoWords.png" alt="MyHoopsCo Logo" class="logo">
    </div>

    <div class="nav-center">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>

    <div class="nav-right"></div>

  </nav>

  <header class="page-header">
    <h1>Contact & Partnerships</h1>
  </header>

<section class="full-page-cta">
  <div class="dual-form-wrapper">
    
    <div class="form-side">
      <h2>Get In Touch</h2>
      <p>Email us for partnerships or inquiries.</p>
      <form class="vertical-cta-form">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="text" placeholder="Subject">
        <textarea placeholder="Your Message" rows="4"></textarea>
        <button type="submit">Send Message</button>
      </form>
    </div>

    <div class="form-side">
      <h2>Stay Connected</h2>
      <p>Get updates on events, drops, and community runs.</p>
      <form class="vertical-cta-form">
        <input type="email" placeholder="Enter your email" required>
        <button type="submit">Join the Community</button>
      </form>
      <span class="cta-note">No spam. Just basketball news.</span>
    </div>

  </div>
</section>
  

  <footer class="site-footer">
    <div class="footer-content">
    
      <!-- Left -->
      <div class="footer-brand">
        <p class="tagline">For the culture</p>
        <p class="copyright">© 2026 MyHoop&Co. All rights reserved.</p>
      </div>

      <!-- Middle -->
      <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>

      <!-- Right -->
      <div class="footer-social">
        <span class="location">Edmonton, AB</span>

          <a href="https://instagram.com/myhoopnco" target="_blank" aria-label="Instagram">
            <i class="fa-brands fa-instagram"></i>
          </a>
        </div>
      </div>

    </div>
  </footer>

</body>
</html>
