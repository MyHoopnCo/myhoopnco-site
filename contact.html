<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <title>MyHoop&Co</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/Logo_NoWords.png">
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <div class="nav-left">
        <a href="index.html" class="brand">
          <img src="images/Logo_NoWords.png" alt="MyHoop&Co Logo" class="logo">
        </a>
      </div>

      <div class="nav-center">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>

      <div class="nav-right"></div>
    </div>
  </nav>

  <header class="hero">
    <img src="images/Contact.JPG" alt="Hero Image" class="hero-img">
    <div class="hero-content">
      <h1>Contact & Partnership</h1>
    </div>
  </header>

<section class="full-page-cta">
  <div class="dual-form-wrapper">
    
    <div class="form-side">
      <h2>Get In Touch</h2>
      <p>Email us for partnerships or inquiries.</p>
      <form id="ctaContact" class="vertical-cta-form">
        <input id="name" name="from_name" type="text" placeholder="Your Name" required>
        <input id="emailv2" name="reply_to" type="email" placeholder="Your Email" required>
        <input id="subject" name="subject" type="text" placeholder="Subject">
        <textarea id="message" name="message" placeholder="Your Message" rows="4"></textarea>
        <button type="submit">Send Message</button>
      </form>
    </div>

    <div class="form-side">
      <h2>Stay Connected</h2>
      <p>Get updates on events, drops, and community runs.</p>
      <form id="ctaSubscribe" class="vertical-cta-form">
        <input id="email" type="email" placeholder="Enter your email" required>
        <button type="submit">Join the Community</button>
      </form>
      <div id="subConfirmation" class="sub-confirmation"></div>
      <span class="cta-note">No spam. Just basketball news.</span>
    </div>

  </div>
</section>
  

  <footer class="site-footer">
    <div class="footer-content">
    
      <!-- Left -->
      <div class="footer-brand">
        <p class="tagline">For the culture</p>
        <p class="copyright">© 2026 MyHoop&Co. All rights reserved.</p>
      </div>

      <!-- Middle -->
      <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>

      <!-- Right -->
      <div class="footer-social">
        <span class="location">Edmonton, AB</span>

          <a href="https://instagram.com/myhoopnco" target="_blank" aria-label="Instagram" rel="noopener">
            <i class="fa-brands fa-instagram"></i>
          </a>
        </div>
      </div>

    </div>
  </footer>

  <script src="js/subscribe.js"></script>
  <script src="js/contactForm.js"></script>

</body>
</html>
